syntax = "proto3";

package cpr.common.v1;

option cc_enable_arenas = true;

// Shared response status for client-facing and control-plane RPCs.
enum RpcStatusCode {
  RPC_STATUS_CODE_UNSPECIFIED = 0;
  RPC_STATUS_CODE_OK = 1;
  RPC_STATUS_CODE_INVALID_ARGUMENT = 2;
  RPC_STATUS_CODE_NOT_FOUND = 3;
  RPC_STATUS_CODE_ALREADY_EXISTS = 4;
  RPC_STATUS_CODE_FAILED_PRECONDITION = 5;
  RPC_STATUS_CODE_RESOURCE_EXHAUSTED = 6;
  RPC_STATUS_CODE_BUSY = 7;
  RPC_STATUS_CODE_RETRY_LATER = 8;
  RPC_STATUS_CODE_NOT_LEADER = 9;
  RPC_STATUS_CODE_TIMEOUT = 10;
  RPC_STATUS_CODE_IO_ERROR = 11;
  RPC_STATUS_CODE_CORRUPTION = 12;
  RPC_STATUS_CODE_UNAVAILABLE = 13;
  RPC_STATUS_CODE_INTERNAL_ERROR = 14;
}

message RpcStatus {
  RpcStatusCode code = 1;
  string message = 2;
}

message NodeAddress {
  string host = 1;
  uint32 port = 2;
}

message LeaderHint {
  uint64 leader_id = 1;
  NodeAddress address = 2;
}

enum ClusterRole {
  CLUSTER_ROLE_UNSPECIFIED = 0;
  CLUSTER_ROLE_FOLLOWER = 1;
  CLUSTER_ROLE_CANDIDATE = 2;
  CLUSTER_ROLE_LEADER = 3;
  CLUSTER_ROLE_LEARNER = 4;
}

enum NodeLifecycleState {
  NODE_LIFECYCLE_STATE_UNSPECIFIED = 0;
  NODE_LIFECYCLE_STATE_RUNNING = 1;
  NODE_LIFECYCLE_STATE_STOPPED = 2;
  NODE_LIFECYCLE_STATE_FAILED = 3;
}

enum LogEntryKind {
  LOG_ENTRY_KIND_UNSPECIFIED = 0;
  LOG_ENTRY_KIND_NO_OP = 1;
  LOG_ENTRY_KIND_COMMAND = 2;
  LOG_ENTRY_KIND_MEMBERSHIP_CHANGE = 3;
}

message ClusterMember {
  uint64 node_id = 1;
  NodeAddress address = 2;
  bool is_learner = 3;
}

message MembershipView {
  repeated ClusterMember voters = 1;
  repeated ClusterMember learners = 2;
  bool has_active_transition = 3;
  uint64 configuration_id = 4;
}

message LogEntry {
  uint64 index = 1;
  uint64 term = 2;
  LogEntryKind type = 3;
  bytes payload = 4;
}

message HardState {
  uint64 current_term = 1;
  uint64 voted_for = 2;
  uint64 commit_index = 3;
  uint64 membership_configuration_id = 4;
}

message SnapshotMetadata {
  uint64 last_included_index = 1;
  uint64 last_included_term = 2;
  MembershipView membership = 3;
}

message PeerProgress {
  uint64 node_id = 1;
  bool is_learner = 2;
  bool is_active = 3;
  uint64 match_index = 4;
  uint64 next_index = 5;
}
