syntax = "proto3";

package cpr.raft.v1;

option cc_enable_arenas = true;

import "common.proto";

service RaftService {
  rpc RequestVote(RequestVoteRequest) returns (RequestVoteResponse);
  rpc AppendEntries(AppendEntriesRequest) returns (AppendEntriesResponse);
  rpc InstallSnapshot(InstallSnapshotRequest) returns (InstallSnapshotResponse);
}

enum VoteRejectReason {
  VOTE_REJECT_REASON_UNSPECIFIED = 0;
  VOTE_REJECT_REASON_NONE = 1;
  VOTE_REJECT_REASON_STALE_TERM = 2;
  VOTE_REJECT_REASON_LOG_OUTDATED = 3;
  VOTE_REJECT_REASON_ALREADY_VOTED = 4;
  VOTE_REJECT_REASON_LEARNER = 5;
}

message RequestVoteRequest {
  uint64 term = 1;
  uint64 candidate_id = 2;
  uint64 last_log_index = 3;
  uint64 last_log_term = 4;
}

message RequestVoteResponse {
  uint64 term = 1;
  bool vote_granted = 2;
  VoteRejectReason reject_reason = 3;
}

message AppendEntriesRequest {
  uint64 term = 1;
  uint64 leader_id = 2;
  uint64 prev_log_index = 3;
  uint64 prev_log_term = 4;
  repeated cpr.common.v1.LogEntry entries = 5;
  uint64 leader_commit = 6;
}

message AppendEntriesResponse {
  uint64 term = 1;
  bool success = 2;
  uint64 match_index = 3;
  uint64 conflict_index = 4;
  uint64 conflict_term = 5;
}

message InstallSnapshotRequest {
  uint64 term = 1;
  uint64 leader_id = 2;
  cpr.common.v1.SnapshotMetadata metadata = 3;
  bytes payload = 4;
}

message InstallSnapshotResponse {
  uint64 term = 1;
  bool success = 2;
  uint64 last_included_index = 3;
}
